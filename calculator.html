
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Attendance Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Attendance Calculator</h1>
            <nav>
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="calculator-card">
                <h2>Calculate Attendance</h2>
                <form id="attendanceForm">
                    <div class="form-group">
                        <label for="attended">Classes Attended:</label>
                        <input type="number" id="attended" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="total">Total Classes:</label>
                        <input type="number" id="total" min="1" required>
                    </div>
                    
                    <button type="submit" class="btn">Calculate</button>
                </form>
                
                <div id="result" class="result hidden">
                    <h3>Your Attendance:</h3>
                    <p id="percentage"></p>
                    <div id="message"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Attendance Calculator</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
